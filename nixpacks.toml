# =============================================================================
# Nixpacks Configuration for Coolify / Railway
# Node.js only — no Python dependency.
# =============================================================================

providers = ["node"]

[variables]
NIXPACKS_NODE_VERSION = "22"
HOME = "/data"

[phases.install]
cmds = ["npm ci", "npm install -g @trustwallet/cli@0.18.0"]

[phases.build]
dependsOn = ["install"]
cmds = ["npm run build"]
